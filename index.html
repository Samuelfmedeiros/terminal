<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Portifolio Terminal</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone@7/babel.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a0f;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: monospace;
      color: #c0c0d0;
    }
    .terminal-wrap {
      width: 100%;
      max-width: 720px;
      padding: 1rem;
    }
    .terminal-card {
      background: linear-gradient(135deg, #0f0f1a 0%, #1a1a2e 100%);
      border: 1px solid rgba(0, 255, 255, 0.12);
      border-radius: 1rem;
      padding: 1.5rem;
      box-shadow: 0 0 40px rgba(0, 0, 0, 0.6), inset 0 0 1px rgba(0, 255, 255, 0.05);
    }
    .terminal-title {
      text-align: center;
      font-size: 1rem;
      color: #22d3ee;
      margin-bottom: 1rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      opacity: 0.7;
    }
    .terminal-output {
      height: 240px;
      overflow-y: auto;
      margin-bottom: 1rem;
      padding: 0.75rem;
      background: rgba(0, 0, 0, 0.35);
      border-radius: 0.5rem;
      border: 1px solid rgba(255, 255, 255, 0.04);
      scroll-behavior: smooth;
    }
    .terminal-output::-webkit-scrollbar { width: 4px; }
    .terminal-output::-webkit-scrollbar-track { background: transparent; }
    .terminal-output::-webkit-scrollbar-thumb { background: rgba(0, 255, 255, 0.2); border-radius: 2px; }
    .history-entry { margin-bottom: 0.5rem; }
    .history-cmd { color: #22d3ee; font-size: 0.75rem; }
    .history-prompt { color: #22d3ee; }
    .history-output {
      font-size: 0.675rem;
      color: #8888aa;
      white-space: pre-wrap;
      margin-top: 0.2rem;
      line-height: 1.4;
    }
    .input-line {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      color: #22d3ee;
    }
    .input-prompt {
      font-size: 0.75rem;
      flex-shrink: 0;
      color: #22d3ee;
    }
    .input-field {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: #e0e0f0;
      font-family: monospace;
      font-size: 0.75rem;
      caret-color: #22d3ee;
    }
    .input-field::placeholder {
      color: #444466;
      font-style: italic;
    }
    .help-hint {
      text-align: center;
      margin-top: 1rem;
      font-size: 0.6rem;
      color: #333355;
    }
    .footer {
      text-align: center;
      margin-top: 0.75rem;
      font-size: 0.55rem;
      color: #333366;
    }
    .footer a {
      color: #5555aa;
      text-decoration: none;
    }
    .footer a:hover {
      color: #7777cc;
    }
  </style>
</head>

    Packets: Sent = 4, Received = 4, Lost = 0 (0% loss),

    Minimum = ${ms - 3}ms, Maximum = ${ms + 5}ms, Average = ${Math.floor(ms + 1)}ms`;
              break;
            }
            if (trimmed.startsWith("whois ")) {
              const name = trimmed.slice(6);
              output = `WHOIS lookup for "${name}"...

  Nome: ${name}
  Cargo: Analista de Dados / Desenvolvedor Full Stack
  Localiza\u00e7\u00e3o: Bras\u00edlia, DF \u2014 Brasil
  Expertise: Power BI, SQL, Python, Machine Learning
  Contato: samuelandrademedeiros@gmail.com
  GitHub: github.com/Samuelfmedeiros
  LinkedIn: linkedin.com/in/samuelandrademedeiros

  [Resultados obtidos do registro WHOIS interno]`;
              break;
            }
            if (trimmed.startsWith("cowsay ")) {
              const msg = trimmed.slice(7) || "Moo!";
              const border = "\u2500".repeat(Math.max(msg.length, 4));
              output = ` \u250C${border}\u2510
 \u2502 ${msg.padEnd(border.length - 1)} \u2502
 \u2514${border}\u2518
  \\\\   ^__^
   \\\\  (oo)\\\\_______
      (__)\\\\       )\\\\/\\\\
          ||----w |
          ||     ||`;
              break;
            }
            output = `Comando n\u00e3o encontrado: '${trimmed}'
Digite 'ajuda' para ver os comandos dispon\u00edveis.`;
        }

        setHistory(prev => [...prev, { cmd, output }]);
      };

      const handleKeyDown = (e) => {
        if (e.key === 'Enter' && input.trim()) {
          commandHistoryRef.current.push(input);
          setHistoryIndex(-1);
          executeCommand(input);
          setInput('');
          return;
        }

        if (e.key === 'ArrowUp') {
          e.preventDefault();
          if (commandHistoryRef.current.length === 0) return;
          const newIndex = historyIndex === -1
            ? commandHistoryRef.current.length - 1
            : Math.max(0, historyIndex - 1);
          setHistoryIndex(newIndex);
          setInput(commandHistoryRef.current[newIndex]);
          return;
        }

        if (e.key === 'ArrowDown') {
          e.preventDefault();
          if (commandHistoryRef.current.length === 0) return;
          if (historyIndex === -1) return;
          const newIndex = historyIndex + 1;
          if (newIndex >= commandHistoryRef.current.length) {
            setHistoryIndex(-1);
            setInput('');
          } else {
            setHistoryIndex(newIndex);
            setInput(commandHistoryRef.current[newIndex]);
          }
          return;
        }

        if (e.key === 'Tab') {
          e.preventDefault();
          const currentInput = input.trim().toLowerCase();
          if (!currentInput) return;
          const matches = COMMANDS.filter(c => c.startsWith(currentInput));
          if (matches.length === 0) return;
          if (matches.length === 1) {
            setInput(matches[0]);
          } else {
            const prefix = matches.reduce((common, cmd) => {
              let i = 0;
              while (i < common.length && i < cmd.length && common[i] === cmd[i]) i++;
              return common.slice(0, i);
            });
            if (prefix.length > currentInput.length) {
              setInput(prefix);
            } else {
              setHistory(prev => [...prev, { cmd: currentInput + '\\t', output: matches.join('  ') }]);
            }
          }
        }
      };

      return (
        <div style={{ fontFamily: 'monospace' }}>
          <div
            ref={scrollRef}
            style={{
              height: '240px',
              overflowY: 'auto',
              marginBottom: '1rem',
              padding: '0.75rem',
              background: 'rgba(0,0,0,0.35)',
              borderRadius: '0.5rem',
              border: '1px solid rgba(255,255,255,0.04)',
              scrollBehavior: 'smooth',
            }}
          >
            {history.map((entry, i) => (
              <div key={i} style={{ marginBottom: '0.5rem' }}>
                {entry.cmd && (
                  <div style={{ color: '#22d3ee', fontSize: '0.75rem' }}>
                    <span style={{ color: '#22d3ee' }}>{PROMPT}&gt;</span>{' '}
                    {entry.cmd}
                  </div>
                )}
                <pre style={{
                  fontSize: '0.675rem',
                  color: '#8888aa',
                  whiteSpace: 'pre-wrap',
                  marginTop: '0.2rem',
                  lineHeight: '1.4',
                  fontFamily: 'monospace',
                }}>
                  {entry.output}
                </pre>
              </div>
            ))}
          </div>

          <div style={{ display: 'flex', alignItems: 'center', gap: '0.5rem', color: '#22d3ee' }}>
            <span style={{ fontSize: '0.75rem', flexShrink: 0, color: '#22d3ee' }}>{PROMPT}&gt;</span>
            <input
              ref={inputRef}
              type="text"
              value={input}
              onChange={(e) => setInput(e.target.value)}
              onKeyDown={handleKeyDown}
              autoFocus
              placeholder="digite um comando..."
              style={{
                flex: 1,
                background: 'transparent',
                border: 'none',
                outline: 'none',
                color: '#e0e0f0',
                fontFamily: 'monospace',
                fontSize: '0.75rem',
                caretColor: '#22d3ee',
              }}
            />
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<Terminal />);
  </script>
</body>
